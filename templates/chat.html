<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctus Verbum</title>


<link rel="stylesheet" href="/static/style.css">


</head>

<body>

<div class="container">


<div class="header">
    ✠ BIBLE AI ✠
</div>

<div id="messages">

    <div class="welcome">

        <h1>✠ Pax Vobiscum ✠</h1>

        <p>
            Welcome to the Scriptorium.
        </p>

        <p>
            Ask about Scripture, Revelation,
            the Gospels, Christian history,
            theology, saints, or doctrine.
        </p>

    </div>

</div>

<div class="input-area">

    <input
        id="messageInput"
        type="text"
        placeholder="Ask and it shall be given unto you..."
        autocomplete="off"
    />

    <button onclick="sendMessage()">
        Send
    </button>

</div>


</div>

<script src="/static/chat.js"></script>

<script>

document
    .getElementById("messageInput")
    .addEventListener("keypress", function(e) {

        if (e.key === "Enter") {
            sendMessage();
        }

    });

</script>

</body>
</html>
